# BuildGraph CI — intelligent selective rebuild for Go monorepos.
#
# How it works:
#   1. "analyze" job: runs the bubunyo/buildgraph-action composite action which
#      downloads the last baseline, runs buildgraph analyze, saves a fresh
#      baseline artifact, and exposes the list of affected services as outputs.
#   2. "build" job: fans out with a matrix over that service list so only the
#      affected services are built.
#
# Customize the build step inside the matrix job to suit your own build /
# test / push commands.

name: BuildGraph CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ── 1. Analyze ──────────────────────────────────────────────────────────────
  analyze:
    name: Analyze changed services
    runs-on: ubuntu-latest
    outputs:
      # JSON array of service names, e.g. '["service-a","service-b"]'
      services: ${{ steps.buildgraph.outputs.services }}
      has_changes: ${{ steps.buildgraph.outputs.has_changes }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Run BuildGraph
        id: buildgraph
        uses: ./action

  # ── 2. Build affected services ───────────────────────────────────────────────
  build:
    name: Build ${{ matrix.service }}
    needs: analyze
    if: needs.analyze.outputs.has_changes == 'true' && needs.analyze.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.analyze.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # ── Customize this step to match your project layout ──
      - name: Build ${{ matrix.service }}
        run: go build -v -o bin/${{ matrix.service }} ./services/${{ matrix.service }}/...

      - name: Test ${{ matrix.service }}
        run: go test -v ./services/${{ matrix.service }}/...
